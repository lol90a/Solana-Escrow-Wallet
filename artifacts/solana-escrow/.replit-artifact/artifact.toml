kind = "web"
previewPath = "/"
title = "Solana Escrow DApp"
version = "1.0.0"
id = "artifacts/solana-escrow"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24612

[services.development]
run = "pnpm --filter @workspace/solana-escrow run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/solana-escrow", "run", "build" ]
publicDir = "artifacts/solana-escrow/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24612"
BASE_PATH = "/"
