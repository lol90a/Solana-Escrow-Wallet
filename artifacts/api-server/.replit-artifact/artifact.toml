kind = "api"
previewPath = "/api"
title = "API Server (Rust)"
version = "1.0.0"
id = "3B4_FFSkEVBkAeYMFRJ2e"

[[services]]
localPort = 8080
name = "API Server"
paths = ["/api"]

[services.development]
run = "cargo run --manifest-path /home/runner/workspace/artifacts/rust-api/Cargo.toml"

[services.production]

[services.production.build]
args = ["cargo", "build", "--release", "--manifest-path", "/home/runner/workspace/artifacts/rust-api/Cargo.toml"]

[services.production.run]
args = ["/home/runner/workspace/artifacts/rust-api/target/release/rust-api"]

[services.production.run.env]
PORT = "8080"
NODE_ENV = "production"

[services.production.health.startup]
path = "/api/healthz"
